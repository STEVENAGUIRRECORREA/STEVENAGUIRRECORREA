name: Update GitHub trophies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  update-trophies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          file: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: tokyonight
          max-cols: 4
          max-rows: 3
          margin-width: 8
          margin-height: 8
          no-background: true
          no-frame: true

      - name: Commit updated trophy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/trophy.svg

          if git diff --cached --quiet; then
            echo "No trophy changes detected."
          else
            git commit -m "chore: update GitHub trophies"
            git push
          fi
